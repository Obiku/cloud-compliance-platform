name: Compliance Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  terraform:
    name: Terraform fmt / validate / plan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.10.5"

      - name: terraform fmt
        run: terraform fmt -check -recursive terraform

      - name: override remote backend with local (no AWS credentials in CI)
        working-directory: terraform/environments/sandbox
        run: |
          cat > override.tf <<'EOF'
          terraform {
            backend "local" {}
          }
          EOF

      - name: terraform init
        working-directory: terraform/environments/sandbox
        run: terraform init -input=false

      - name: terraform validate
        working-directory: terraform/environments/sandbox
        run: terraform validate

      - name: terraform plan (ephemeral, no AWS credentials)
        working-directory: terraform/environments/sandbox
        env:
          AWS_ACCESS_KEY_ID: "test"
          AWS_SECRET_ACCESS_KEY: "test"
          AWS_EC2_METADATA_DISABLED: "true"
        run: terraform plan -input=false -lock=false -var ci_smoke_test=true
        # No real AWS credentials are configured in CI - the fake key/secret above only
        # satisfy the provider's SDK, which otherwise errors before even reaching AWS.
        # ci_smoke_test=true skips the provider's GetCallerIdentity validation call, which
        # would otherwise hit real AWS and fail with these fake credentials. override.tf
        # above swaps the real S3 backend for a local one, so this plan runs against empty
        # local state and always shows "everything to create" - it is a syntax/logic smoke
        # test, not a real diff against the live account. The real plan/apply against the
        # live backend is run locally; see docs/policy_mapping.md.

  checkov:
    name: Checkov (CIS-mapped IaC coverage, informational)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: terraform
          framework: terraform
          soft_fail: true
          output_format: cli
        # Checkov's open-source edition does not assign severity to findings, so it
        # cannot participate in the critical/high blocking gate (see docs/policy_mapping.md).
        # It runs informationally for broad CIS AWS Benchmark coverage; Trivy below
        # provides the severity-based gate.

  trivy:
    name: Trivy config scan (blocks on CRITICAL/HIGH)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Trivy config scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: config
          scan-ref: terraform
          severity: CRITICAL,HIGH
          exit-code: "1"

  bandit:
    name: Bandit SAST (blocks on MEDIUM/HIGH)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install bandit
      - name: Run Bandit
        run: bandit -r python -ll

  pip-audit:
    name: pip-audit dependency scan (blocks on any unaccepted vulnerability)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pip-audit
      - name: Run pip-audit (runtime dependencies)
        run: pip-audit -r python/requirements.txt
      - name: Run pip-audit (dev/test dependencies)
        run: pip-audit -r python/requirements-dev.txt
        # Accepted findings are recorded in docs/vulnerability_log.md and suppressed
        # here with --ignore-vuln <ID> once triaged, never silently.

  pytest:
    name: pytest (phase4_iam_governance unit tests, mocked AWS via moto)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r python/requirements-dev.txt
      - name: Run pytest
        working-directory: python
        run: pytest -v
